<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 112" role="img" aria-label="Bes Saiman Group mark">
  <!--
    КАК У TESLA:
    Tesla T = поперечное сечение статора электродвигателя (вид сверху)
    Bes Saiman B = вид спереди двухкамерной трубчатой печи:
      — левая стойка = монтажный фланец корпуса печи
      — верхнее D-отверстие = открытая малая камера (первая зона нагрева)
      — нижнее D-отверстие = открытая большая камера (вторая зона нагрева)
    Единый сплошной знак, нет линий и обводок — только геометрия.
  -->
  <path
    fill="#0F172A"
    fill-rule="evenodd"
    d="
      M 8,6
      L 46,6
      A 24,24 0 0,1 46,54
      L 48,54
      A 26,26 0 0,1 48,106
      L 8,106
      Z

      M 22,16
      L 34,16
      A 12,12 0 0,1 34,40
      L 22,40
      Z

      M 22,60
      L 36,60
      A 14,14 0 0,1 36,88
      L 22,88
      Z
    "
  />
</svg>
